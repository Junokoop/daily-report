<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>施工日報表</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bd:#6b7280;--hbg:#f3f4f6;--ac:#374151;--tx:#111827;--mu:#9ca3af;--ib:#ffffff;--st:#f9fafb;--br:#e5e7eb;--grn:#2d6a4f;--red:#9b2226}
body{background:#f3f4f6;font-family:sans-serif;color:var(--tx);font-size:15px;padding:0 0 40px}
.nav{display:flex;background:var(--bd);padding:10px 12px;gap:6px;align-items:center;position:sticky;top:0;z-index:100}
.nav-title{color:#fff;font-weight:700;font-size:15px;flex:1}
.nav-btn{padding:7px 12px;border:1.5px solid rgba(255,255,255,.5);border-radius:6px;background:transparent;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.nav-btn.active{background:#fff;color:var(--bd)}
.page{display:none;padding:12px 10px}
.page.show{display:block}
.bottom-bar{display:flex;gap:10px;margin-top:12px;padding:0 0 20px}
.bottom-bar button{flex:1;height:60px;border:2px solid var(--bd);border-radius:10px;font-size:18px;font-weight:700;cursor:pointer}
.btn-clear{background:#fff;color:var(--ac)}
.btn-submit{background:var(--grn);color:#fff;border-color:var(--grn)}
.card{background:#fff;border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.1);margin-bottom:12px}
.ttl{text-align:center;font-size:22px;font-weight:700;letter-spacing:.2em;padding:16px 0 14px;border-bottom:2px solid var(--bd)}
.sh{background:var(--hbg);font-size:14px;font-weight:700;letter-spacing:.1em;padding:9px 14px;border-top:1px solid var(--br);border-bottom:1px solid var(--br)}
.meta{padding:12px 14px;border-bottom:1px solid var(--br);display:flex;flex-direction:column;gap:10px}
.mrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mlbl{font-weight:600;font-size:14px;white-space:nowrap}.mi{flex:1;border:1px solid var(--br);border-radius:8px;padding:8px 10px;font-size:15px;width:100%;box-sizing:border-box;background:#fff;outline:none}
.dgrp{display:flex;align-items:center;gap:4px}
input.di{width:56px;height:44px;border:1.5px solid var(--br);border-radius:6px;background:var(--ib);font-size:15px;text-align:center;color:var(--tx);outline:none}
input.ti{flex:1;min-width:0;height:44px;border:1.5px solid var(--br);border-radius:6px;background:var(--ib);font-size:15px;padding:0 10px;color:var(--tx);outline:none}
.wa{padding:10px 14px;border-bottom:1px solid var(--br)}
.wa textarea{width:100%;min-height:110px;border:1.5px solid var(--br);border-radius:6px;background:var(--ib);font-size:15px;color:var(--tx);padding:10px;resize:vertical;outline:none;line-height:1.8}
.awrap,.ewrap{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:8px}
.ac{border:1px solid var(--br);border-radius:8px;overflow:hidden;background:var(--ib)}
.atop{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid var(--br);background:var(--st)}
.atop .no{font-size:12px;color:var(--mu);white-space:nowrap}
.atop input{flex:1;border:none;background:transparent;font-size:15px;color:var(--tx);outline:none;height:36px}
.achks{display:flex}
.ci{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;gap:4px;border-right:1px solid var(--br)}
.ci:last-child{border-right:none}
.ci span{font-size:12px;color:var(--mu)}
.ci input[type=checkbox]{width:22px;height:22px;accent-color:var(--ac);cursor:pointer}
.ci-ot{flex:1.4;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;gap:4px}
.ci-ot span{font-size:12px;color:var(--mu)}
.ci-ot input{width:54px;height:28px;border:1.5px solid var(--br);border-radius:5px;background:var(--ib);font-size:14px;text-align:center;color:var(--tx);outline:none;padding:0 4px}
.ec{border:1px solid var(--br);border-radius:8px;overflow:hidden;background:var(--ib);margin-bottom:4px}
.er{display:flex;align-items:center;border-bottom:1px solid var(--br);min-height:44px}
.er:last-child{border-bottom:none}
.el{font-size:12px;color:var(--mu);white-space:nowrap;padding:0 10px;min-width:68px;background:var(--st);align-self:stretch;display:flex;align-items:center;border-right:1px solid var(--br);flex-shrink:0}
.er input[type=text],.er input[type=number]{flex:1;border:none;background:transparent;font-size:15px;color:var(--tx);outline:none;height:44px;padding:0 10px;min-width:0}
.ivw{flex:1;display:flex;align-items:center;gap:8px;padding:0 12px;height:auto;min-height:44px;flex-wrap:wrap}
.ivw input[type=checkbox]{width:22px;height:22px;accent-color:var(--ac);cursor:pointer;flex-shrink:0}
.ivw span{font-size:13px;color:var(--mu)}
.inv-photo-btn,.inv-camera-btn{padding:4px 10px;background:var(--hbg);border:1px solid var(--br);border-radius:5px;font-size:12px;cursor:pointer;white-space:nowrap}
.inv-photos-row{display:flex;gap:10px;flex-wrap:wrap;padding:12px 14px 8px;border-bottom:1px solid var(--br);overflow:visible}
.inv-thumb{width:52px;height:52px;border-radius:4px;object-fit:cover;border:1px solid var(--br);cursor:pointer}
.db{background:none;border:none;color:#c0a090;font-size:20px;padding:0 8px;cursor:pointer;line-height:1;flex-shrink:0}
.ab{display:flex;align-items:center;justify-content:center;width:100%;height:44px;border:1.5px dashed var(--br);border-radius:8px;background:none;color:var(--mu);font-size:14px;cursor:pointer}
.rb{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:10px}
.accum-bar{padding:10px 14px;background:#eaf4ec;border-bottom:1px solid var(--br);font-size:13px;color:var(--grn);font-weight:700}
.rr{display:flex;align-items:center;gap:8px}
.rr .rl{font-size:14px;white-space:nowrap;min-width:54px}
.rr input{flex:1;height:44px;min-width:0;border:1.5px solid var(--br);border-radius:6px;background:var(--ib);font-size:15px;padding:0 10px;color:var(--tx);outline:none}
table.st{width:100%;border-collapse:collapse;border-top:1.5px solid var(--bd)}
.st td{padding:13px 14px;border-bottom:1px solid var(--br);vertical-align:middle}
.st tr:last-child td{border-bottom:none;border-top:1.5px solid var(--bd)}
.lc{background:var(--hbg);font-weight:700;font-size:14px;border-right:1px solid var(--br);width:130px;white-space:nowrap}
.vc{font-weight:700;font-size:16px;color:var(--ac)}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.loading{text-align:center;padding:32px;color:var(--mu);font-size:14px}
.admin-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.admin-header h2{font-size:17px;font-weight:700;flex:1}
.admin-count{background:var(--hbg);border-radius:20px;padding:3px 12px;font-size:13px;font-weight:600}
.report-card{background:#fff;border:1.5px solid var(--bd);border-radius:10px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.report-head{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer;background:var(--st)}
.report-meta{flex:1;min-width:0}
.r-project{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-sub{font-size:12px;color:var(--mu);margin-top:2px}
.report-arrow{color:var(--mu);font-size:20px;transition:transform .2s;flex-shrink:0}
.report-arrow.open{transform:rotate(90deg)}
.report-body{display:none;border-top:1px solid var(--br)}
.report-body.open{display:block}
.rbs{padding:10px 14px;border-bottom:1px solid var(--br)}
.rbs:last-child{border-bottom:none}
.rbl{font-size:12px;color:var(--mu);font-weight:700;margin-bottom:4px}
.rbc{font-size:14px;line-height:1.7;white-space:pre-wrap}
.rbt{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.rbt th{background:var(--hbg);padding:6px 8px;text-align:center;border:1px solid var(--br);font-weight:700}
.rbt td{padding:6px 8px;border:1px solid var(--br);text-align:center}
.rbt tr:nth-child(even) td{background:var(--st)}
.action-wrap{display:flex;gap:8px;justify-content:flex-end;padding:10px 14px;flex-wrap:wrap}
.action-wrap button{border-radius:6px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid}
.btn-pdf{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn-del{background:none;color:var(--red);border-color:var(--red)}
.btn-edit{background:none;color:#1a6ea8;border-color:#1a6ea8}
.empty{text-align:center;padding:48px 20px;color:var(--mu)}
.empty .ei{font-size:48px;margin-bottom:12px}
.pw-wrap{padding:24px 16px}
.pw-wrap input{width:100%;height:48px;border:1.5px solid var(--br);border-radius:8px;background:var(--ib);font-size:16px;padding:0 14px;color:var(--tx);outline:none;margin-bottom:12px;display:block}
.pw-wrap button{width:100%;height:48px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
.select-page{min-height:80vh;background:#f9fafb;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:14px}
.select-page h2{font-size:24px;font-weight:900;margin-bottom:16px;text-align:center;color:var(--ac);letter-spacing:.05em}
.select-btn{width:100%;max-width:320px;height:72px;border:none;border-radius:14px;font-size:22px;font-weight:900;cursor:pointer;color:#fff;background:#6b7280var(--ac);display:block;margin:0 auto;letter-spacing:.05em;box-shadow:0 4px 16px rgba(0,0,0,.18)}
.select-btn.admin-select{background:#374151;font-size:18px;height:60px}
.reporter-mgmt{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.reporter-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--st);border:1px solid var(--br);border-radius:8px}
.reporter-item span{flex:1;font-weight:600}
.btn-remove-reporter{background:none;border:1px solid var(--red);color:var(--red);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
.add-reporter-row{display:flex;gap:8px}
.add-reporter-row input{flex:1;height:40px;border:1.5px solid var(--br);border-radius:6px;background:var(--ib);font-size:14px;padding:0 10px;color:var(--tx);outline:none}
.add-reporter-row button{height:40px;padding:0 14px;background:var(--grn);color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer}
.filter-bar{background:#fff;border:1.5px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.filter-bar select{flex:1;height:38px;border:1.5px solid var(--br);border-radius:6px;background:var(--ib);font-size:14px;padding:0 8px;color:var(--tx);outline:none}
.summary-row{display:block;padding:12px 16px;border-bottom:1px solid var(--br)}
.summary-row:last-child{border-bottom:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.batch-check{width:18px;height:18px;accent-color:var(--red);cursor:pointer;flex-shrink:0}.batch-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#9b2226;color:#fff;padding:14px;font-size:15px;font-weight:700;z-index:200;gap:12px;align-items:center;justify-content:center}.batch-bar.show{display:flex}.photo-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;display:none;align-items:center;justify-content:center;cursor:pointer}
.photo-overlay.show{display:flex}
.photo-overlay img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:20px 16px 40px}
.modal-box h3{font-size:17px;font-weight:700;margin-bottom:16px;text-align:center}
@media print{
  @page{margin:10mm;size:A4 portrait}
  body{background:#fff!important;padding:0!important}
  .nav,.bottom-bar,.ab,.db,.action-wrap,.admin-header,.report-head,.page,.modal-overlay,.filter-bar{display:none!important}
  #printArea{display:block!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
}
#printArea{display:none}
.print-title{text-align:center;font-size:20px;font-weight:700;letter-spacing:.2em;padding:12px 0;border-bottom:2px solid #333;margin-bottom:12px}
.print-meta{margin-bottom:10px;font-size:14px;line-height:2.2}
.print-sh{background:#e5e7eb;font-weight:700;font-size:13px;padding:6px 10px;margin:10px 0 4px;border:1px solid #b0a99a}
.print-content{font-size:14px;line-height:1.8;padding:4px 2px;white-space:pre-wrap}
.print-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:8px}
.print-table th{background:#e5e7eb;padding:6px 8px;text-align:center;border:1px solid #b0a99a;font-weight:700}
.print-table td{padding:6px 8px;border:1px solid #b0a99a;text-align:center}
.print-sum{margin-top:8px;border:1px solid #6b7280;border-collapse:collapse;width:100%}
.print-sum td{padding:8px 12px;border-bottom:1px solid #b0a99a;font-size:14px}
.print-sum td:first-child{background:#e5e7eb;font-weight:700;width:130px}
</style>
</head>
<body>
<div class="nav">
  <span class="nav-title" id="navTitle">&#x1F4CB; 施工日報</span>
  <button class="nav-btn" id="navHome" onclick="goHome()" style="display:none">&#x1F3E0;</button>
  <button class="nav-btn" id="navForm" onclick="showPage('form')" style="display:none">填報</button>
  <button class="nav-btn" id="navHistory" onclick="showPage('history')" style="display:none">紀錄</button>
  <button class="nav-btn" id="navAdmin" onclick="showPage('admin')" style="display:none">管理</button>
</div>
<div class="toast" id="toast"></div>

<div class="page show" id="pageSelect">
  <div class="select-page">
    <h2>&#x1F477; 請選擇身份</h2>
    <div id="selectBtnArea" style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px">
      <button class="select-btn" style="background:#6b7280" onclick="selectReporter('&#x7D00;&#x67CF;&#x5B8F;')">紀柏宏</button>
      <button class="select-btn" style="background:#6b7280" onclick="selectReporter('&#x675C;&#x5FD7;&#x5091;')">杜志傑</button>
      <button class="select-btn admin-select" onclick="goAdminLogin()">🔐 管理者</button>
    </div>
  </div>
</div>

<div class="page" id="pageForm">
  <div class="card">
    <div class="ttl">施工日報表</div>
    <div class="meta">
      <div class="mrow">
        <span class="mlbl">填表日期：</span>
        <div class="dgrp">
          <input class="di" id="Y" type="number" min="100" max="999">年
          <input class="di" id="M" type="number" min="1" max="12" style="width:46px">月
          <input class="di" id="D" type="number" min="1" max="31" style="width:46px">日
        </div>
      </div>
      <div class="mrow"><span class="mlbl">填報者：</span><span id="reporterDisplay" style="font-weight:900;font-size:22px;color:var(--grn);letter-spacing:.05em"></span></div>
      <div class="mrow"><span class="mlbl">工程名稱：</span><input class="ti" id="pname" type="text" placeholder="請輸入工程名稱"></div>
    </div>
    <div class="sh">施工項目</div>
    <div class="wa"><textarea id="witem" placeholder="請填寫今日施工項目內容…"></textarea></div>
    <div class="sh">出工人數及人員簽到表</div>
    <div class="awrap" id="attList"></div>
    <div class="sh">公款支出每日明細表</div>
    <div class="ewrap" id="expList"></div>
    <div class="sh">本日接收公款</div>
    <div class="rb">
      <div class="rr"><span class="rl">上筆結餘公款</span><input id="rc" type="number" placeholder="0" min="0" inputmode="numeric" readonly style="background:#f5f5f5;color:var(--mu)"><span style="font-size:14px">元</span></div>
      <div class="rr"><span class="rl">本日接收公款</span><input id="rc2" type="number" placeholder="0" min="0" inputmode="numeric" oninput="calc()"><span style="font-size:14px">元</span></div>
      <div class="rr"><span class="rl">備考</span><input id="rn" type="text"></div>
    </div>
    <table class="st">
      <tr><td class="lc">本日支出合計</td><td class="vc" id="tca">$0</td></tr>
      <tr><td class="lc">本日刷卡合計</td><td class="vc" id="tcd">$0</td></tr>
      <tr><td class="lc">現金剩餘公款</td><td class="vc" id="trm">$0</td></tr>
    </table>
  </div>
  <div class="bottom-bar">
    <button class="btn-clear" onclick="clearForm()">清除表單</button>
    <button class="btn-submit" id="btnSubmit" onclick="submitReport()">&#x1F4E4; 上傳報表</button>
  </div>
</div>

<div class="page" id="pageHistory">
  <div class="admin-header">
    <h2>&#x1F4CB; 我的填報紀錄</h2>
    <span class="admin-count" id="historyCount">共 0 筆</span>
  </div>
  <div class="card" style="padding:12px 14px;margin-bottom:12px;background:#eaf4ec;border-color:var(--grn)">
    <div style="display:flex;flex-direction:column;gap:6px">
      <div style="display:flex;justify-content:space-between;font-size:13px">
        <span style="color:var(--mu)">上筆結餘公款</span>
        <span id="historyLastRemain" style="font-weight:700;color:var(--grn)">—</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px">
        <span style="color:var(--mu)">本日接收公款</span>
        <span id="historyLastOut" style="font-weight:700;color:var(--ac)">—</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px">
        <span style="color:var(--mu)">本日支出金額</span>
        <span id="historyLastTotalCash" style="font-weight:700;color:var(--red)">—</span>
      </div>
      <div style="height:1px;background:var(--br)"></div>
      <div style="display:flex;justify-content:space-between;font-size:15px">
        <span style="font-weight:700">現金剩餘公款</span>
        <span id="historyAccum" style="font-weight:900;font-size:17px">—</span>
      </div>
    </div>
  </div>
  <div id="historyList"></div>
</div>

<div class="page" id="pageAdminLogin">
  <div class="card">
    <div class="sh">&#x1F512; 管理者登入</div>
    <div class="pw-wrap">
      <input type="password" id="pwInput" placeholder="請輸入管理密碼" onkeydown="if(event.key==='Enter')checkPw()">
      <button onclick="checkPw()">進入管理頁面</button>
    </div>
  </div>
</div>

<div class="page" id="pageAdmin">
  <div class="admin-header">
    <h2>&#x1F4CA; 報表管理</h2>
    <span class="admin-count" id="adminCount">共 0 筆</span>
  </div>
  <div class="card" id="notifyCard" style="margin-bottom:12px;border-color:#ffc107">
    <div class="sh" style="background:#fff3cd;color:#856404;border-color:#ffc107">&#x1F514; 填報者更新通知</div>
    <div id="notifyList" style="padding:8px 14px;font-size:14px;color:var(--mu)">載入中…</div>
  </div>
  <div class="card" id="summaryCard" style="margin-bottom:12px">
    <div class="sh">&#x1F4B0; 各填報者公款總覽</div>
    <div id="summaryTable" style="padding:4px 0"></div>
  </div>
  <div class="filter-bar">
    <span style="font-size:14px;font-weight:600;white-space:nowrap">篩選：</span>
    <select id="filterReporter" onchange="filterReports()">
      <option value="">全部填報者</option>
    </select>
  </div>
  <div id="reportList"></div>
  <div class="card" style="margin-top:16px">
    <div class="sh">&#x1F477; 填報者管理</div>
    <div class="reporter-mgmt" id="reporterMgmt"></div>
    <div style="padding:10px 14px;border-top:1px solid var(--br)">
      <div class="add-reporter-row">
        <input type="text" id="newReporterInput" placeholder="新增填報者姓名">
        <button onclick="addReporter()">新增</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h3>&#x270F;&#xFE0F; 編輯報表</h3>
    <div id="editModalContent"></div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button onclick="closeEditModal()" style="flex:1;height:48px;background:#fff;border:1.5px solid var(--br);border-radius:8px;font-size:15px;cursor:pointer">取消</button>

<script>
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function openPhotoOverlay(src) {
  var el = document.getElementById('photoOverlay');
  var img = document.getElementById('photoOverlayImg');
  if (!el || !img) return;
  img.src = src;
  el.classList.add('show');
}
function closePhotoOverlay() {
  var el = document.getElementById('photoOverlay');
  var img = document.getElementById('photoOverlayImg');
  if (el) el.classList.remove('show');
  if (img) img.src = '';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 2500);
}

var API = 'https://script.google.com/macros/s/AKfycbzK2QLztdqee4GF9fnDJX0l8AdPOWRqQhvJU_RW2xWD0qeo5jlBd5sEVBHfRFByLdQA/exec';
var ADMIN_PW = '1234';
var REPORTERS_KEY = 'gas_reporters';
var currentReporter = '';
var isAdmin = false;
var allReports = [];
var editingId = null;
var expPhotoMap = {};
var addAttBtn = null;
var addExpBtn = null;
var attList = null;
var expList = null;
var _reportCache = null;
var _reportCacheTime = 0;
var CACHE_TTL = 60000; // 60秒快取
var _photoCache = {}; // 照片快取 {id: [src,...]}

function getReporters() {
  try {
    var v = localStorage.getItem(REPORTERS_KEY);
    return v ? JSON.parse(v) : ['紀柏宏', '杜志傑'];
  } catch(e) {
    return ['紀柏宏', '杜志傑'];

}
function saveReporters(arr) {
  localStorage.setItem(REPORTERS_KEY, JSON.stringify(arr));
}

function renderSelectPage(){
  var reporters = getReporters();

  if (!el) return;

  var defaultReporters = ['紀柏宏','杜志傑'];

  dynBtns.forEach(function(b) { b.remove(); });
  // 在管理者按鈕前插入動態填報者

function goAdminLogin() {

function setNavMode(mode) {

  expList.appendChild(addExpBtn);

  calc();

function fetchReports(forceRefresh) {
  var now = Date.now();
  if (!forceRefresh && _reportCache && (now - _reportCacheTime) < CACHE_TTL) {
    return Promise.resolve(_reportCache);
  }
  var url = API + '?action=list&noPhotos=1&t=' + now;
  return fetch(url, { redirect: 'follow' })
    .then(function(r) {
      if (!r.ok && r.type !== 'opaque') throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(text) {
      if (!text || text.trim() === '') throw new Error('empty response');
      var res;
      try { res = JSON.parse(text); } catch(e) {
        // GAS 有時回傳 HTML，找其中的 JSON
        var match = text.match(/\{"ok":true.*\}/);
        if (match) { try { res = JSON.parse(match[0]); } catch(e2) { throw new Error('parse fail'); } }
        else throw new Error('not JSON');
      }
      if (!res || !res.ok) throw new Error(res ? (res.error || 'not ok') : 'no response');
      _reportCache = res.data;
      _reportCacheTime = Date.now();
      return res.data;
    });
}

function loadAccum() {
  fetchReports(false)
    .then(function(data) {
      var myReports = data.filter(function(r) { return r.reporter === currentReporter; });
      var lastRemaining = myReports.length > 0 ? (parseFloat(myReports[0].remaining) || 0) : 0;
      document.getElementById('rc').value = lastRemaining;
      document.getElementById('rc2').value = '';
      calc();
    })
    .catch(function() {});
}

function addAtt() {
  if (!attList) return;
  var n = attList.querySelectorAll('.ac').length + 1;
  var c = document.createElement('div'); c.className = 'ac';
  c.innerHTML = '<div class="atop"><span class="no">人員 ' + n + '</span><input type="text" placeholder="請輸入姓名"><button class="db" type="button">&#x2715;</button></div><div class="achks"><label class="ci"><input type="checkbox"><span>上午</span></label><label class="ci"><input type="checkbox"><span>下午</span></label><div class="ci-ot"><span>加班(時)</span><input type="number" class="ot-input" min="0" max="24" step="0.5" placeholder="0"></div></div>';
  c.querySelector('.db').onclick = function() { attList.removeChild(c); };
  attList.insertBefore(c, addAttBtn);
}

function addExp() {
  if (!expList) return;
  var idx = 'e' + Date.now() + Math.random();
  var c = document.createElement('div'); c.className = 'ec'; c.dataset.expIdx = idx;
  c.innerHTML = '<div class="er"><span class="el">購買項目</span><input type="text" placeholder="項目名稱"><button class="db" type="button">&#x2715;</button></div>' +
    '<div class="er"><span class="el">發票</span><div class="ivw"><input type="checkbox"><span>已附發票</span><button class="inv-photo-btn" type="button">&#x1F4C1; 上傳</button><button class="inv-camera-btn" type="button">&#x1F4F7; 拍照</button><input type="file" accept="image/*" multiple style="display:none" class="inv-file-input"><input type="file" accept="image/*" capture="environment" style="display:none" class="inv-camera-input"></div></div>' +
    '<div class="inv-photos-row" style="display:none"></div>' +
    '<div class="er"><span class="el">現金金額</span><input type="number" class="cc" placeholder="0" min="0" inputmode="numeric"></div>' +
    '<div class="er"><span class="el">刷卡金額</span><input type="number" class="kk" placeholder="0" min="0" inputmode="numeric"></div>';
  expPhotoMap[idx] = [];
  c.querySelector('.db').onclick = function() { expList.removeChild(c); delete expPhotoMap[idx]; calc(); };
  c.querySelectorAll('.cc,.kk').forEach(function(el) { el.oninput = calc; });
  var pb = c.querySelector('.inv-photo-btn');
  var cb = c.querySelector('.inv-camera-btn');
  var fi = c.querySelector('.inv-file-input');
  var ci = c.querySelector('.inv-camera-input');
  var pr = c.querySelector('.inv-photos-row');
  pb.onclick = function() { fi.click(); };
  if (cb && ci) { cb.onclick = function() { ci.click(); }; }
  if (cb && ci) { cb.onclick = function() { ci.click(); }; }
  function handleFiles(files) {
    Array.from(files).forEach(function(f) {
      var reader = new FileReader();
      reader.onload = function(ev) { expPhotoMap[idx].push(ev.target.result); renderInvPhotos(pr, idx); };
      reader.readAsDataURL(f);
    });
  }
  fi.onchange = function() { handleFiles(fi.files); fi.value = ''; };
  if (ci) { ci.onchange = function() { handleFiles(ci.files); ci.value = ''; }; }
  expList.insertBefore(c, addExpBtn);
  calc();
}

function renderInvPhotos(row, idx) {
  var photos = expPhotoMap[idx] || [];
  row.style.display = photos.length ? 'flex' : 'none';
  row.style.flexWrap = 'wrap';
  row.style.gap = '6px';
  row.innerHTML = '';
  photos.forEach(function(src, i) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:inline-block;margin-top:6px';

    img.onclick = (function(ii) { return function() { openPhotoOverlay(expPhotoMap[idx][ii]); }; })(i);
    var delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.style.cssText = 'position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--red);color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1';
    delBtn.onclick = (function(ii) { return function(e) {
      e.stopPropagation();
      expPhotoMap[idx].splice(ii, 1);
      renderInvPhotos(row, idx);
    }; })(i);
    wrap.appendChild(img);
    wrap.appendChild(delBtn);
    row.appendChild(wrap);
  });
}

function calc() {
  var cash = 0, card = 0;
  document.querySelectorAll('.cc').forEach(function(el) { cash += parseFloat(el.value) || 0; });
  document.querySelectorAll('.kk').forEach(function(el) { card += parseFloat(el.value) || 0; });
  var rC = parseFloat(document.getElementById('rc').value) || 0;
  document.getElementById('tca').textContent = '$' + cash.toLocaleString();
  document.getElementById('tcd').textContent = '$' + card.toLocaleString();
  document.getElementById('trm').textContent = '$' + (rC - cash).toLocaleString();
}

function doReset() {
  document.getElementById('pname').value = '';
  document.getElementById('witem').value = '';
  document.getElementById('rc').value = '';
  document.getElementById('rc2').value = '';
  document.getElementById('rn').value = '';

  document.getElementById('Y').value = d.getFullYear() - 1911;

function clearForm() {
  if (!confirm('確定要清除所有填寫內容嗎？')) return;
  doReset();
}

function submitReport() {
  var btn = document.getElementById('btnSubmit');
  if (btn) { btn.textContent = '上傳中…'; btn.disabled = true; }

  // 出工人員
  var att = [];
  document.getElementById('attList').querySelectorAll('.ec').forEach(function(c) {
    var nameEl = c.querySelector('input[type="text"]');
    if (!nameEl || !nameEl.value.trim()) return;
    var cbs = c.querySelectorAll('input[type="checkbox"]');
    var otEl = c.querySelector('.ot-input');
    att.push({
      name: nameEl.value.trim(),
      am: cbs[0] ? cbs[0].checked : false,
      pm: cbs[1] ? cbs[1].checked : false,
      ot: otEl ? (parseFloat(otEl.value)||0) : 0
    });
  });

  // 公款支出
  var exps = [];
  document.getElementById('expList').querySelectorAll('.ec').forEach(function(c) {
    var itemEl = c.querySelector('input[type="text"]');
    if (!itemEl || !itemEl.value.trim()) return;
    var expIdx = c.dataset.expIdx || '';
    var invEl = c.querySelector('input[type="checkbox"]');
    var cashEl = c.querySelector('.cc');
    var cardEl = c.querySelector('.kk');
    var photos = expPhotoMap[expIdx] ? expPhotoMap[expIdx].slice() : [];
    exps.push({
      item: itemEl.value.trim(),
      inv: invEl ? invEl.checked : false,
      cash: cashEl ? (parseFloat(cashEl.value)||0) : 0,
      card: cardEl ? (parseFloat(cardEl.value)||0) : 0,
      photos: photos
    });
  });

  var rc0 = parseFloat(document.getElementById('rc').value)||0;
  var rc2 = parseFloat(document.getElementById('rc2').value)||0;
  var rc = rc0 + rc2;
  var totalCash = exps.reduce(function(s,e){return s+(e.cash||0);},0);
  var totalCard = exps.reduce(function(s,e){return s+(e.card||0);},0);

  var report = {
    id: Date.now().toString(),
    date: document.getElementById('Y').value + '年' + document.getElementById('M').value + '月' + document.getElementById('D').value + '日',
    reporter: currentReporter,
    project: document.getElementById('pname').value.trim(),
    workItems: document.getElementById('witem').value.trim(),
    attendance: att,
    expenses: exps,
    receiptCash: rc,
    totalCash: totalCash,
    totalCard: totalCard,
    remaining: rc - totalCash,
    receiptNote: document.getElementById('rn').value.trim(),
    uploadedAt: new Date().toISOString()
  };

  function onDone() {
    if (btn) { btn.textContent = '上傳報表'; btn.disabled = false; }
    showToast('報表已成功上傳！');
    doReset(); _reportCache = null;
    setTimeout(function(){ loadAccum(); }, 1200);
  }

  var flat = [];
  report.expenses.forEach(function(ex, ei) {
    (ex.photos||[]).forEach(function(src, pi) { if (src) flat.push({ei:ei, pi:pi}); });
  });

  if (!flat.length) {
    var url = API + '?payload=' + encodeURIComponent(JSON.stringify(report));
    fetch(url, {mode:'no-cors'}).catch(function(){});
    setTimeout(onDone, 1500);
    return;
  }

  var done = 0;
  flat.forEach(function(task) {
    var src = report.expenses[task.ei].photos[task.pi];
    compressPhoto(src, 1000, 0.75).then(function(out) {
      report.expenses[task.ei].photos[task.pi] = out;
      done++; if (done >= flat.length) doPost();
    }).catch(function() {
      done++; if (done >= flat.length) doPost();
    });
  });
  setTimeout(function() { if (done < flat.length) doPost(); }, 10000);

  function doPost() {
    var form = new FormData();
    form.append('payload', JSON.stringify(report));
    fetch(API, {method:'POST', body:form, mode:'no-cors'}).catch(function(){});
    setTimeout(onDone, 1500);
  }
}

function loadHistory() {
  var listEl = document.getElementById('historyList');
  listEl.innerHTML = '<div class="loading">載入中…</div>';
  fetchReports(false)
    .then(function(data) {
      try {
        data = data.filter(function(r) { return r.reporter === currentReporter; });
        document.getElementById('historyCount').textContent = '共 ' + data.length + ' 筆';
        if (data.length > 0) {
          var lastRemain = parseFloat(data[0].remaining) || 0;
          var lastReceiptCash = parseFloat(data[0].receiptCash) || 0;
          var lastTotalCash = parseFloat(data[0].totalCash) || 0;
          // 上筆結餘 = 前一筆的 remaining（data[1]），若無則 0
          var prevRemaining = data.length > 1 ? (parseFloat(data[1].remaining) || 0) : 0;
          // 本日接收 = 總接收 - 上筆結餘
          var todayReceived = lastReceiptCash - prevRemaining;
          var isNeg = lastRemain < 0;
          var color = isNeg ? 'var(--red)' : 'var(--grn)';
          document.getElementById('historyLastRemain').textContent = '$' + prevRemaining.toLocaleString();
          document.getElementById('historyLastRemain').style.color = 'var(--grn)';
          document.getElementById('historyLastOut').textContent = '$' + todayReceived.toLocaleString();
          document.getElementById('historyLastTotalCash').textContent = '$' + lastTotalCash.toLocaleString();
          document.getElementById('historyAccum').textContent = '$' + lastRemain.toLocaleString();
          document.getElementById('historyAccum').style.color = color;
        }
        if (!data.length) { listEl.innerHTML = '<div class="empty"><div class="ei">📭</div><p>尚無填報紀錄</p></div>'; return; }
        listEl.innerHTML = '';
        data.forEach(function(rpt) {
          try { listEl.appendChild(buildCard(rpt, false)); }
          catch(cardErr) { }
        });
      } catch(e) {
        listEl.innerHTML = '<div class="empty"><div class="ei">❌</div><p>載入失敗，請重新整理頁面</p></div>';
      }
    })
    .catch(function(err) {
      listEl.innerHTML = '<div class="empty"><div class="ei">❌</div><p>載入失敗，請重新整理頁面</p></div>';
    });
}

function loadAllReports() {
  var listEl = document.getElementById('reportList');
  listEl.innerHTML = '<div class="loading">載入中…</div>';
  fetchReports(true)
    .then(function(data) {
      allReports = data;
      document.getElementById('adminCount').textContent = '共 ' + allReports.length + ' 筆';
      // 背景預抓有照片的報表（最多5筆）
      allReports.filter(function(r){
        return (r.expenses||[]).some(function(e){ return e.photoCount > 0; });
      }).slice(0, 5).forEach(function(r) {
        if (_photoCache[r.id]) return;
        fetch(API + '?action=getphotos&id=' + r.id)
          .then(function(res){ return res.json(); })
          .then(function(res){ if (res.ok && res.photos) _photoCache[r.id] = res.photos; })
          .catch(function(){});
      });
      try { updateFilterDropdown(); } catch(e) {}
      try { renderSummaryTable(allReports); } catch(e) {}
      try { renderNotifyList(allReports); } catch(e) {}
      // renderAllReports 最後執行，確保前面錯誤不影響它
      listEl.innerHTML = '';
      var successCount = 0;
      allReports.forEach(function(rpt, ri) {
        try {
          listEl.appendChild(buildCard(rpt, true));
          successCount++;
        } catch(e) {
          // 顯示簡化卡片
          var errDiv = document.createElement('div');
          errDiv.className = 'report-card';
          errDiv.style.padding = '12px 14px';
          errDiv.innerHTML = '<div style="color:var(--mu);font-size:13px">&#x26A0;&#xFE0F; 報表 ' + (ri+1) + ' 顯示失敗<br>' +
            esc(String(rpt.date||'')) + ' ' + esc(String(rpt.reporter||'')) + ' ' + esc(String(rpt.project||'')) + '</div>';
          listEl.appendChild(errDiv);
        }
      });
      if (!successCount && !allReports.length) {
        listEl.innerHTML = '<div class="empty"><div class="ei">&#x1F4EB;</div><p>尚無報表</p></div>';
      }
    })
    .catch(function(err) {
      listEl.innerHTML = '<div class="empty"><div class="ei">❌</div><p>載入失敗，請重新整理頁面</p></div>';
    });
}

function renderSummaryTable(data) {
  var el = document.getElementById('summaryTable');
  var reporters = getReporters();
  var html = '';
  for (var i = 0; i < reporters.length; i++) {
    var r = reporters[i];
    var myData = data.filter(function(d) { return d.reporter === r; });
    var lastRemain = myData.length > 0 ? (parseFloat(myData[0].remaining) || 0) : null;
    var lastReceiptCash = myData.length > 0 ? (parseFloat(myData[0].receiptCash) || 0) : 0;
    var lastTotalCash = myData.length > 0 ? (parseFloat(myData[0].totalCash) || 0) : 0;
    // 上筆結餘 = 前一筆的 remaining
    var prevRemaining = myData.length > 1 ? (parseFloat(myData[1].remaining) || 0) : 0;
    // 本日接收 = 總接收 - 上筆結餘
    var todayReceived = lastReceiptCash - prevRemaining;
    var isNeg = lastRemain !== null && lastRemain < 0;
    var remainText = lastRemain !== null ? '$' + lastRemain.toLocaleString() : '—';
    var remainColor = isNeg ? 'var(--red)' : 'var(--grn)';
    html += '<div class="summary-row">' +
      '<div style="font-weight:700;font-size:15px;margin-bottom:6px">' + esc(r) + '</div>' +
      '<div style="display:flex;flex-direction:column;gap:4px;font-size:13px">' +
        '<div style="display:flex;justify-content:space-between"><span style="color:var(--mu)">上筆結餘公款</span><span style="font-weight:700;color:var(--grn)">$' + prevRemaining.toLocaleString() + '</span></div>' +
        '<div style="display:flex;justify-content:space-between"><span style="color:var(--mu)">本日接收公款</span><span style="font-weight:700;color:var(--ac)">$' + todayReceived.toLocaleString() + '</span></div>' +
        '<div style="display:flex;justify-content:space-between"><span style="color:var(--mu)">本日支出金額</span><span style="font-weight:700;color:var(--red)">$' + lastTotalCash.toLocaleString() + '</span></div>' +
        '<div style="height:1px;background:var(--br);margin:2px 0"></div>' +
        '<div style="display:flex;justify-content:space-between;font-size:15px"><span style="font-weight:700">現金剩餘公款</span><span style="font-weight:900;color:' + remainColor + '">' + remainText + '</span></div>' +
      '</div></div>';
  }
  el.innerHTML = html || '<div style="padding:16px;text-align:center;color:var(--mu)">尚無資料</div>';
}

function renderNotifyList(data) {
  var el = document.getElementById('notifyList');
  if (!el) return;
  var edited = data.filter(function(r) { return r.editedAt && r.editedAt !== ''; });
  if (!edited.length) {
    el.innerHTML = '<div style="padding:4px 0;color:var(--mu)">目前無更新通知</div>';
    return;
  }
  edited.sort(function(a, b) { return new Date(b.editedAt) - new Date(a.editedAt); });
  el.innerHTML = '';
  edited.forEach(function(r) {
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--br);cursor:pointer;transition:background .15s';
    row.onmouseenter = function() { row.style.background = '#fffbe6'; };
    row.onmouseleave = function() { row.style.background = ''; };
    row.innerHTML =
      '<span style="font-size:20px;flex-shrink:0">✏️</span>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(r.project) + '</div>' +
        '<div style="font-size:12px;color:var(--mu);margin-top:2px">' + esc(r.date) + ' ｜ ' + esc(r.reporter) + '</div>' +
        '<div style="font-size:12px;color:#856404;margin-top:3px;background:#fff3cd;padding:3px 8px;border-radius:4px;display:inline-block">' +
          '修正者：' + esc(r.editedBy) + '　' + esc(r.editedAt) +
        '</div>' +
      '</div>' +
      '<span style="color:var(--mu);font-size:18px;align-self:center;flex-shrink:0">›</span>';
    row.onclick = (function(rpt) {
      return function() { openViewModal(rpt); };
    })(r);
    el.appendChild(row);
  });
}

function updateFilterDropdown() {
  var sel = document.getElementById('filterReporter');
  var cur = sel.value;
  sel.innerHTML = '<option value="">全部填報者</option>';
  var reporters = getReporters();
  for (var i = 0; i < reporters.length; i++) {
    var opt = document.createElement('option');
    opt.value = reporters[i]; opt.textContent = reporters[i];
    if (reporters[i] === cur) opt.selected = true;
    sel.appendChild(opt);
  }
}

function filterReports() {
  var val = document.getElementById('filterReporter').value;
  var filtered = val ? allReports.filter(function(r) { return r.reporter === val; }) : allReports;
  renderAllReports(filtered);
}

function renderAllReports(data) {
  var listEl = document.getElementById('reportList');
  if (!data.length) { listEl.innerHTML = '<div class="empty"><div class="ei">📭</div><p>尚無報表</p></div>'; return; }
  listEl.innerHTML = '';
  data.forEach(function(rpt) {
    try { listEl.appendChild(buildCard(rpt, true)); }
    catch(e) { }
  });
}

function renderReporterMgmt() {
  var reporters = getReporters();
  var el = document.getElementById('reporterMgmt');
  el.innerHTML = '';
  for (var i = 0; i < reporters.length; i++) {
    (function(r, idx) {
      var row = document.createElement('div'); row.className = 'reporter-item';
      row.innerHTML = '<span>' + esc(r) + '</span>';
      var btn = document.createElement('button'); btn.className = 'btn-remove-reporter'; btn.textContent = '移除';
      btn.onclick = function() {
        if (!confirm('確定移除填報者「' + r + '」？')) return;
        var arr = getReporters(); arr.splice(idx, 1); saveReporters(arr);
        renderReporterMgmt(); renderSelectPage(); updateFilterDropdown();
      };
      row.appendChild(btn); el.appendChild(row);
    })(reporters[i], i);
  }
}

function addReporter() {
  var name = document.getElementById('newReporterInput').value.trim();
  if (!name) { showToast('請輸入姓名'); return; }
  var arr = getReporters();
  if (arr.indexOf(name) >= 0) { showToast('填報者已存在'); return; }
  arr.push(name); saveReporters(arr);
  document.getElementById('newReporterInput').value = '';
  renderReporterMgmt(); renderSelectPage(); updateFilterDropdown();
  showToast('已新增：' + name);
}

var _batchMode = false;

function toggleBatchMode() {
  _batchMode = !_batchMode;
  // 對所有 report-head 套用 batch-mode
  document.querySelectorAll('.report-head').forEach(function(h){ h.classList.toggle('batch-mode', _batchMode); });
  var btn = document.getElementById('batchDeleteBtn');
  if (btn) btn.textContent = _batchMode ? '✕ 取消' : '☑ 批次刪除';
  var bar = document.getElementById('batchBar');
  if (bar) bar.classList.toggle('show', _batchMode);
  if (!_batchMode) { document.querySelectorAll('.batch-check').forEach(function(c){ c.checked=false; }); }
  updateBatchCount();
}

function updateBatchCount() {
  var checked = document.querySelectorAll('.batch-check:checked');
  var count = checked.length;
  var el = document.getElementById('batchCount');
  if (el) el.textContent = '已選 ' + count + ' 筆';
  var bar = document.getElementById('batchBar');
  if (bar) bar.classList.toggle('show', count > 0);
}

function cancelBatchMode() {
  _batchMode = false;
  document.querySelectorAll('.batch-check').forEach(function(c){ c.checked=false; });
  document.querySelectorAll('.report-head').forEach(function(h){ h.classList.remove('batch-mode'); });
  var bar = document.getElementById('batchBar'); if (bar) bar.classList.remove('show');
  var btn = document.getElementById('batchDeleteBtn'); if (btn) btn.textContent = '☑ 批次刪除';
  updateBatchCount();
}

function confirmBatchDelete() {
  var checked = Array.from(document.querySelectorAll('.batch-check:checked'));
  if (!checked.length) { showToast('請先勾選要刪除的報表'); return; }
  if (!confirm('確定刪除選取的 ' + checked.length + ' 筆報表？此動作無法復原。')) return;
  var ids = checked.map(function(c){ return c.dataset.rptId; });
  ids.forEach(function(id) {
    fetch(API + '?action=delete&id=' + id, {mode:'no-cors'}).catch(function(){});
  });
  setTimeout(function() {
    document.querySelectorAll('.batch-check').forEach(function(c){ c.checked=false; });
    var bar = document.getElementById('batchBar'); if (bar) bar.classList.remove('show');
    _reportCache = null;
    showToast('已刪除 ' + ids.length + ' 筆');
    if (document.getElementById('pageAdmin').classList.contains('show')) loadAllReports();
    else loadHistory();
  }, 1800);
}

function deleteReport(id, onSuccess, onFail) {
  fetch(API + '?action=delete&id=' + id)
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.ok) {
        _reportCache = null;
        _reportCacheTime = 0;
        showToast('已刪除');
        if (onSuccess) onSuccess();
      } else {
        showToast('刪除失敗');
        if (onFail) onFail();
      }
    })
    .catch(function() { showToast('網路錯誤'); if (onFail) onFail(); });
}

function buildCard(rpt, isAdminView) {
  var wrap = document.createElement('div'); wrap.className = 'report-card';
  var head = document.createElement('div'); head.className = 'report-head';
  head.innerHTML = '<input type="checkbox" class="batch-check" data-rpt-id="' + rpt.id + '" onclick="event.stopPropagation();updateBatchCount()" style="margin-right:8px;width:18px;height:18px;accent-color:var(--red);cursor:pointer;flex-shrink:0"><div class="report-meta"><div class="r-project">' + esc(rpt.project) + '</div><div class="r-sub">' + esc(rpt.date) + ' | ' + esc(rpt.reporter) + '</div></div><span class="report-arrow">›</span>';
  var body = document.createElement('div'); body.className = 'report-body';
  if (rpt.workItems) body.innerHTML += '<div class="rbs"><div class="rbl">施工項目</div><div class="rbc">' + esc(rpt.workItems) + '</div></div>';
  if (rpt.attendance && rpt.attendance.length) {
    var h = '<div class="rbs"><div class="rbl">出工人員</div><table class="rbt"><tr><th>姓名</th><th>上午</th><th>下午</th><th>加班(時)</th></tr>';
    rpt.attendance.forEach(function(a) { h += '<tr><td>' + esc(a.name) + '</td><td>' + (a.am ? '✔' : '—') + '</td><td>' + (a.pm ? '✔' : '—') + '</td><td>' + (a.ot ? a.ot + 'h' : '—') + '</td></tr>'; });
    body.innerHTML += h + '</table></div>';
  }
  if (rpt.expenses && rpt.expenses.length) {
    var h2 = '<div class="rbs"><div class="rbl">公款支出</div><table class="rbt"><tr><th>項目</th><th>發票</th><th>現金</th><th>刷卡</th></tr>';
    rpt.expenses.forEach(function(e) {
      h2 += '<tr><td>' + esc(e.item) + '</td><td>' + (e.inv ? '✔' : '—') + '</td><td>' + (e.cash ? '$' + Number(e.cash).toLocaleString() : '—') + '</td><td>' + (e.card ? '$' + Number(e.card).toLocaleString() : '—') + '</td></tr>';
    });
    body.innerHTML += h2 + '</table></div>';
    var allPhotos = [];
    rpt.expenses.forEach(function(e) { if (e.photos && e.photos.length) allPhotos = allPhotos.concat(e.photos); });
    // 計算照片總數（含 photoCount 欄位）
    var totalPhotoCount = 0;
    rpt.expenses.forEach(function(e) {
      if (e.photos && e.photos.length) totalPhotoCount += e.photos.length;
      else if (e.photoCount) totalPhotoCount += e.photoCount;
    });
    if (allPhotos.length > 0) {
      // 有實際照片（非 noPhotos 模式）
      var photoContainer = document.createElement('div');
      photoContainer.className = 'rbs';
      photoContainer.innerHTML = '<div class="rbl">發票照片（' + allPhotos.length + '張）</div>';
      var photoWrap = document.createElement('div');
      photoWrap.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;margin-top:4px';
      allPhotos.forEach(function(src) {
        var img = document.createElement('img');
        img.src = src;
        img.style.cssText = 'width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--br);cursor:pointer';
        img.onclick = (function(s){ return function(){ openPhotoOverlay(s); }; })(src);
        photoWrap.appendChild(img);
      });
      photoContainer.appendChild(photoWrap);
      body.appendChild(photoContainer);
    } else if (totalPhotoCount > 0) {
      var photoContainer2 = document.createElement('div');
      photoContainer2.className = 'rbs';
      var photoLabel = document.createElement('div');
      photoLabel.className = 'rbl';
      photoLabel.textContent = '發票照片';
      photoContainer2.appendChild(photoLabel);
      var photoWrap2 = document.createElement('div');
      photoWrap2.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;margin-top:6px';
      photoWrap2.dataset.rptId = rpt.id;
      photoWrap2.dataset.loaded = '0';
      photoContainer2.appendChild(photoWrap2);
      body.appendChild(photoContainer2);
      // 非管理者（填報者）直接載入，不等展開
      if (!isAdminView) {
        (function(rptId, wrap) {
          if (_photoCache[rptId]) {
            wrap.dataset.loaded = '1';
            _photoCache[rptId].forEach(function(src) {
              if (!src) return;
              var img = document.createElement('img');
              img.style.cssText = 'width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--br);cursor:pointer';
              img.src = src;
              img.onclick = (function(s){ return function(e){ e.stopPropagation(); openPhotoOverlay(s); }; })(src);
              wrap.appendChild(img);
            });
          } else {
            fetch(API + '?action=getphotos&id=' + rptId + '&t=' + Date.now())
              .then(function(r) { return r.json(); })
              .then(function(res) {
                if (!res.ok || !res.photos || !res.photos.length) return;
                _photoCache[rptId] = res.photos;
                wrap.dataset.loaded = '1';
                res.photos.forEach(function(src) {
                  if (!src) return;
                  var img = document.createElement('img');
                  img.style.cssText = 'width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--br);cursor:pointer';
                  img.src = src;
                  img.onclick = (function(s){ return function(e){ e.stopPropagation(); openPhotoOverlay(s); }; })(src);
                  wrap.appendChild(img);
                });
              }).catch(function() {});
          }
        })(rpt.id, photoWrap2);
      }
    }
  }
  var settlDiv = document.createElement('div');
  settlDiv.className = 'rbs';
  // 計算上筆結餘和本日接收
  var cacheData2 = _reportCache || allReports || [];
  var myRpts2 = cacheData2.filter(function(x){ return x.reporter === rpt.reporter; });
  var myIdx2 = -1;
  for (var mi2 = 0; mi2 < myRpts2.length; mi2++) { if (myRpts2[mi2].id === rpt.id) { myIdx2 = mi2; break; } }
  var prevRpt2 = (myIdx2 >= 0 && myIdx2 + 1 < myRpts2.length) ? myRpts2[myIdx2 + 1] : null;
  var settlPrev = prevRpt2 ? (parseFloat(prevRpt2.remaining) || 0) : 0;
  var settlToday = (parseFloat(rpt.receiptCash) || 0) - settlPrev;

  settlDiv.innerHTML = '<div class="rbl">公款結算</div>' +
    '<div style="font-size:13px;line-height:2.2">' +
    '上筆結餘：<strong style="color:var(--grn)">$' + Number(settlPrev).toLocaleString() + '</strong><br>' +
    '本日接收公款：<strong style="color:var(--ac)">$' + Number(settlToday).toLocaleString() + '</strong><br>' +
    '現金支出：<strong style="color:var(--red)">$' + Number(rpt.totalCash || 0).toLocaleString() + '</strong>　刷卡：<strong>$' + Number(rpt.totalCard || 0).toLocaleString() + '</strong><br>' +
    '<div style="border-top:1px solid var(--br);margin-top:2px;padding-top:4px"><strong style="color:' + (Number(rpt.remaining||0) < 0 ? 'var(--red)' : 'var(--grn)') + ';font-size:15px">現金剩餘：$' + Number(rpt.remaining || 0).toLocaleString() + '</strong></div>' +
    (rpt.receiptNote ? '<div style="color:var(--mu);font-size:12px">備考：' + esc(rpt.receiptNote) + '</div>' : '') +
    '</div>';
  body.appendChild(settlDiv);
  var timeDiv = document.createElement('div');
  timeDiv.className = 'rbs';
  timeDiv.style.cssText = 'color:var(--mu);font-size:12px';
  var editBadge = rpt.editedAt ? ' <span style="background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:4px;padding:2px 8px;font-size:11px">✏️ 已修正</span>' : '';
  timeDiv.innerHTML = '上傳時間：' + esc(rpt.uploadedAt) + editBadge +
    (rpt.editedAt ? '<br><span style="color:#856404">修正：' + esc(rpt.editedAt) + ' / ' + esc(rpt.editedBy) + '</span>' : '') +
    (rpt.editedNote ? '<br><span style="background:#ffc107;color:#000;border-radius:3px;padding:1px 6px;font-size:11px;font-weight:700">修正項目：' + esc(rpt.editedNote) + '</span>' : '');
  body.appendChild(timeDiv);
  var aw = document.createElement('div'); aw.className = 'action-wrap';
  var editBtn = document.createElement('button'); editBtn.className = 'btn-edit'; editBtn.textContent = '✏️ 編輯';
  editBtn.onclick = (function(r) { return function(e) { e.stopPropagation(); openEditModal(r); }; })(rpt);
  aw.appendChild(editBtn);
  var pdfBtn = document.createElement('button'); pdfBtn.className = 'btn-pdf'; pdfBtn.textContent = '📄 PDF';
  pdfBtn.onclick = (function(r) { return function(e) { e.stopPropagation(); printReport(r); }; })(rpt);
  aw.appendChild(pdfBtn);
  if (isAdminView) {
    var delBtn = document.createElement('button'); delBtn.className = 'btn-del'; delBtn.textContent = '🗑 刪除';
    delBtn.onclick = (function(r, w) { return function(e) {
      e.stopPropagation();
      if (!confirm('確定要刪除這份報表嗎？')) return;
      delBtn.textContent = '刪除中…'; delBtn.disabled = true;
      fetch(API + '?action=delete&id=' + r.id, { mode: 'no-cors' })
        .then(function() {
          _reportCache = null;
          _reportCacheTime = 0;
          showToast('已刪除');
          w.remove();
          var cur = parseInt(document.getElementById('adminCount').textContent.replace(/\D/g, '')) || 0;
          document.getElementById('adminCount').textContent = '共 ' + Math.max(0, cur - 1) + ' 筆';
        })
        .catch(function() {
          showToast('網路錯誤');
          delBtn.textContent = '🗑 刪除'; delBtn.disabled = false;
        });
    }; })(rpt, wrap);
    aw.appendChild(delBtn);
  }
  body.appendChild(aw);
  // 儲存 rptId 在 body dataset 供 onclick 使用
  if (totalPhotoCount > 0 && isAdminView) {
    body.dataset.rptId = rpt.id;
    body.dataset.photosLoaded = '0';
  }
  head.onclick = function() {
    var isOpen = body.classList.contains('open');
    body.classList.toggle('open', !isOpen);
    head.querySelector('.report-arrow').classList.toggle('open', !isOpen);
    // 管理者展開時載入照片
    if (!isOpen && body.dataset.rptId && body.dataset.photosLoaded === '0') {
      body.dataset.photosLoaded = '1';
      var wrap = body.querySelector('[data-rpt-id="' + body.dataset.rptId + '"]');
      if (!wrap) {
        // 找任何 data-rpt-id
        wrap = body.querySelector('[data-rpt-id]');
      }
      if (!wrap) return;
      function renderPhotosToWrap(photos, w) {
        photos.forEach(function(src) {
          if (!src) return;
          var img = document.createElement('img');
          img.style.cssText = 'width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--br);cursor:pointer';
          img.src = src;
          img.onclick = (function(s){ return function(e){ e.stopPropagation(); openPhotoOverlay(s); }; })(src);
          w.appendChild(img);
        });
      }
      var rid = body.dataset.rptId;
      if (_photoCache[rid]) {
        // 直接從 cache 顯示
        renderPhotosToWrap(_photoCache[rid], wrap);
      } else {
        fetch(API + '?action=getphotos&id=' + rid + '&t=' + Date.now())
          .then(function(r) { return r.json(); })
          .then(function(res) {
            if (!res.ok || !res.photos || !res.photos.length) { body.dataset.photosLoaded = '0'; return; }
            _photoCache[rid] = res.photos;
            renderPhotosToWrap(res.photos, wrap);
          })
          .catch(function() { body.dataset.photosLoaded = '0'; });
      }
    }
  };
  wrap.appendChild(head); wrap.appendChild(body);
  return wrap;
}

  var exp = rpt.expenses || [];

    return '<tr><td style="padding:6px 8px;border:1px solid var(--br)">' + esc(a.name) + '</td>' +

  var rows = [
    ['填表日期', esc(rpt.date||'')],
    ['填報者', esc(rpt.reporter||'')],

  var infoHtml = rows.map(function(r) {
    return '<div style="display:flex;padding:8px 0;border-bottom:1px solid var(--br)">' +
      '<span style="color:var(--mu);min-width:80px;font-size:13px">' + r[0] + '</span>' +

  document.getElementById('editModalContent').innerHTML =

function editExpPhotoCamera(btn, epIdx) {

function editExpPhotoUpload(btn, epIdx) {

  fi.onchange = function() { handleEditPhotos(fi.files, epIdx, ec); fi.value = ''; };
  fi.click();
}

function handleEditPhotos(files, epIdx, ec) {
  if (!window._editExpPhotoMap) window._editExpPhotoMap = {};
  if (!window._editExpPhotoMap[epIdx]) window._editExpPhotoMap[epIdx] = [];
  var row = ec.querySelector('.inv-photos-row');
  Array.from(files).forEach(function(f) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      window._editExpPhotoMap[epIdx].push(ev.target.result);
      renderEditInvPhotos(row, epIdx);
    };
    reader.readAsDataURL(f);
  });
}
function doRemoveEditPhoto(btn) {
  var epIdx = btn.getAttribute('data-ep');
  var pi = parseInt(btn.getAttribute('data-pi'));
  removeEditPhoto(epIdx, pi, btn);
}

function removeEditPhoto(epIdx, pi, btn) {
  if (!window._editExpPhotoMap || !window._editExpPhotoMap[epIdx]) return;
  window._editExpPhotoMap[epIdx].splice(pi, 1);
  // 重新渲染該 ec 的 photos row
  var ec = btn.closest ? btn.closest('[data-ep-idx="' + epIdx + '"]') : null;
  if (!ec) {
    // fallback: 找 editExpList
    var allEc = document.getElementById('editExpList') ? document.getElementById('editExpList').querySelectorAll('.ec') : [];
    for (var i = 0; i < allEc.length; i++) {
      if (allEc[i].dataset.epIdx === epIdx) { ec = allEc[i]; break; }
    }
  }
  if (ec) {
    var row = ec.querySelector('.inv-photos-row');
    if (row) renderEditInvPhotos(row, epIdx);
  }
}

function renderEditInvPhotos(rowOrNull, epIdx) {
  // 每次從 DOM 重新取得 row，避免 Modal 重開後 row 參考失效
  var row = rowOrNull || document.querySelector('[data-ep-idx="' + epIdx + '"] .inv-photos-row');
  if (!row) return;
  var photos = (window._editExpPhotoMap && window._editExpPhotoMap[epIdx]) ? window._editExpPhotoMap[epIdx] : [];
  row.style.display = photos.length ? 'flex' : 'none';
  row.style.flexWrap = 'wrap';
  row.style.gap = '10px';
  row.style.overflow = 'visible';
  row.style.paddingTop = '10px';
  row.style.paddingLeft = '14px';
  row.style.paddingBottom = '8px';
  row.innerHTML = '';
  photos.forEach(function(src, i) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;display:inline-block;margin-top:4px';
    var img = document.createElement('img');
    img.src = src;
    img.style.cssText = 'width:64px;height:64px;object-fit:cover;border-radius:6px;border:1px solid var(--br);cursor:pointer;display:block';
    img.onclick = (function(s){ return function() { openPhotoOverlay(s); }; })(src);
    var delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.textContent = '✕';
    delBtn.style.cssText = 'position:absolute;top:-8px;right:-8px;width:22px;height:22px;border-radius:50%;background:#9b2226;color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;line-height:22px;text-align:center;padding:0;z-index:10';
    delBtn.onclick = (function(ii, r, eidx) { return function(e) {
      e.stopPropagation();
      e.preventDefault();
      if (!window._editExpPhotoMap[eidx]) return;
      window._editExpPhotoMap[eidx].splice(ii, 1);
      renderEditInvPhotos(r, eidx);
    }; })(i, row, epIdx);
    wrap.appendChild(img);
    wrap.appendChild(delBtn);
    row.appendChild(wrap);
  });
}

function updateEditTotal() {
  var prev = parseFloat(document.getElementById('editRcPrev') ? document.getElementById('editRcPrev').value : 0) || 0;
  var today = parseFloat(document.getElementById('editRcToday') ? document.getElementById('editRcToday').value : 0) || 0;
  var totalCash = parseFloat(document.getElementById('editTotalCash') ? document.getElementById('editTotalCash').value : 0) || 0;
  var remaining = prev + today - totalCash;
  var el = document.getElementById('editRemaining');
  if (el) {
    el.textContent = '$' + remaining.toLocaleString();
    el.style.color = remaining < 0 ? 'var(--red)' : 'var(--grn)';
  }
}

function getEditedNote(orig, newData) {
  if (!orig || !newData) return '';
  var changes = [];

  // 工程名稱
  if ((newData.project||'') !== (orig.project||'')) changes.push('工程名稱');
  // 施工項目
  if ((newData.workItems||'') !== (orig.workItems||'')) changes.push('施工項目');
  // 接收公款
  if (String(newData.receiptCash||0) !== String(parseFloat(orig.receiptCash)||0)) changes.push('接收公款');
  // 出工人員
  var origAtt = JSON.stringify((orig.attendance||[]).map(function(a){ return {name:a.name,am:a.am,pm:a.pm,ot:a.ot}; }));
  var newAtt = JSON.stringify((newData.attendance||[]).map(function(a){ return {name:a.name,am:a.am,pm:a.pm,ot:a.ot}; }));
  if (origAtt !== newAtt) changes.push('出工人員');
  // 支出項目
  var origExp = JSON.stringify((orig.expenses||[]).map(function(e){ return {item:e.item,cash:e.cash,card:e.card,inv:e.inv}; }));
  var newExp = JSON.stringify((newData.expenses||[]).map(function(e){ return {item:e.item,cash:e.cash,card:e.card,inv:e.inv}; }));
  if (origExp !== newExp) changes.push('公款支出');
  // 備考
  if ((newData.receiptNote||'') !== (orig.receiptNote||'')) changes.push('備考');
  // 日期
  if ((newData.date||'') !== (orig.date||'')) changes.push('日期');

  return changes.length ? changes.join('、') : '內容修正';
}

function deleteFromEdit() {
  if (!editingId) return;
  if (!confirm('確定要刪除這份報表？此動作無法復原')) return;
  var btn = document.getElementById('delEditBtn');
  btn.textContent = '刪除中…'; btn.disabled = true;
  var delId = editingId;
  // 直接呼叫 GAS，不用 deleteReport 共用函數
  fetch(API + '?action=delete&id=' + delId, {mode:'no-cors'})
    .then(function() {
      _reportCache = null; _reportCacheTime = 0;
      showToast('已刪除'); closeEditModal();
      setTimeout(function() { loadHistory(); }, 1000);
    })
    .catch(function() {
      // no-cors 不會真的 catch，但以防萬一也當成成功
      _reportCache = null; _reportCacheTime = 0;
      showToast('已刪除'); closeEditModal();
      setTimeout(function() { loadHistory(); }, 1000);
    });
}

function compressPhoto(base64, maxWidth, quality) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      try {
        var canvas = document.createElement('canvas');
        var scale = Math.min(1, maxWidth / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality || 0.6));
      } catch(e) {
        resolve(base64); // 壓縮失敗就用原圖
      }
    };
    img.onerror = function() {
      resolve(base64); // 載入失敗就用原圖
    };
    img.src = base64;
  });
}

function saveEdit() {
  if (!editingId) return;
  var btn = document.getElementById('saveEditBtn');
  btn.textContent = '儲存中…'; btn.disabled = true;

  var Y = document.getElementById('editY').value;
  var M = document.getElementById('editM').value;
  var D = document.getElementById('editD').value;

  var att = [];
  document.getElementById('editAttList').querySelectorAll('.ec').forEach(function(c) {
    var name = c.querySelector('.edit-att-name').value.trim();
    if (!name) return;
    att.push({name:name, am:c.querySelector('.edit-att-am').checked, pm:c.querySelector('.edit-att-pm').checked, ot:parseFloat(c.querySelector('.edit-att-ot').value)||0});
  });

  var exp = [];
  document.getElementById('editExpList').querySelectorAll('.ec').forEach(function(c) {
    var item = c.querySelector('.edit-exp-item').value.trim();
    if (!item) return;
    var epIdx = c.dataset.epIdx || '';
    var photos = (epIdx && window._editExpPhotoMap && window._editExpPhotoMap[epIdx]) ? window._editExpPhotoMap[epIdx].slice() : [];
    exp.push({item:item, inv:c.querySelector('.edit-exp-inv').checked, cash:parseFloat(c.querySelector('.edit-exp-cash').value)||0, card:parseFloat(c.querySelector('.edit-exp-card').value)||0, photos:photos});
  });

  var rcPrev = parseFloat(document.getElementById('editRcPrev') ? document.getElementById('editRcPrev').value : 0) || 0;
  var rcToday = parseFloat(document.getElementById('editRcToday') ? document.getElementById('editRcToday').value : 0) || 0;
  var rc = rcPrev + rcToday;
  var totalCash = exp.reduce(function(s,e){return s+(e.cash||0);},0);
  var totalCard = exp.reduce(function(s,e){return s+(e.card||0);},0);

  var patchOrig = null;
  var cacheArr = _reportCache || allReports || [];
  for (var pi3 = 0; pi3 < cacheArr.length; pi3++) {
    if (cacheArr[pi3].id === editingId) { patchOrig = cacheArr[pi3]; break; }
  }

  var patchData = {
    id: editingId,
    date: Y+'年'+M+'月'+D+'日',
    project: document.getElementById('editPname').value.trim(),
    workItems: document.getElementById('editWitem').value.trim(),
    attendance: att,
    expenses: exp,
    receiptCash: rc,
    totalCash: totalCash,
    totalCard: totalCard,
    remaining: rc - totalCash,
    receiptNote: document.getElementById('editRn').value.trim(),
    editedAt: new Date().toLocaleString('zh-TW'),
    editedBy: currentReporter || '管理者',
    editedNote: getEditedNote(patchOrig, {project: document.getElementById('editPname').value.trim(), workItems: document.getElementById('editWitem').value.trim(), receiptCash: rc, attendance: att, expenses: exp, receiptNote: document.getElementById('editRn').value.trim(), date: Y+'年'+M+'月'+D+'日'})
  };

  function finish() {
    btn.textContent = '儲存'; btn.disabled = false;
    showToast('已更新！');
    closeEditModal();
    _reportCache = null;
    delete _photoCache[editingId];
    setTimeout(function() {
      if (document.getElementById('pageAdmin').classList.contains('show')) loadAllReports();
      else loadHistory();
    }, 800);
  }

  // 判斷有沒有照片（含已載入的舊照片 + 新上傳的）
  var hasAnyPhoto = exp.some(function(e){ return e.photos && e.photos.length; });

  if (hasAnyPhoto) {
    // 收集所有照片壓縮
    var tasks = [];
    exp.forEach(function(e, ei) {
      (e.photos || []).forEach(function(src, pi) {
        if (src) {
          tasks.push({ei:ei, pi:pi, src:src});
        }
      });
    });

    var done = 0;
    var total = tasks.length;
    if (total === 0) {
      // 有 expenses 但沒有實際 src，直接送
      var form = new FormData();
      form.append('payload', JSON.stringify({action:'edit', data:patchData}));
      fetch(API, {method:'POST', body:form, mode:'no-cors'}).catch(function(){});
      setTimeout(finish, 2000);
      return;
    }

    // 逐一壓縮
    tasks.forEach(function(task) {
      compressPhoto(task.src, 1000, 0.75).then(function(out) {
        exp[task.ei].photos[task.pi] = out;
        done++;
        if (done >= total) sendWithPhotos();
      }).catch(function() {
        done++;
        if (done >= total) sendWithPhotos();
      });
    });

    // 10秒超時
    setTimeout(function() { if (done < total) sendWithPhotos(); }, 10000);

    function sendWithPhotos() {
      patchData.expenses = exp; // 用壓縮後的照片
      var form = new FormData();
      form.append('payload', JSON.stringify({action:'edit', data:patchData}));
      fetch(API, {method:'POST', body:form, mode:'no-cors'}).catch(function(){});
      setTimeout(finish, 2000);
    }
  } else {
    // 無照片直接送
    var url = API + '?payload=' + encodeURIComponent(JSON.stringify({action:'edit', data:patchData}));
    fetch(url, {mode:'no-cors'}).catch(function(){});
    setTimeout(finish, 2000);
  }
}

</script>
